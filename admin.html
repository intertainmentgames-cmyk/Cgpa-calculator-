<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Control Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #1e1b4b 0%, #0f0728 60%, #03000a 100%);
            min-height: 100vh;
            color: var(--text-main);
            padding-bottom: 50px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(3, 0, 10, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-size: 1.4rem; font-weight: 700; color: white; }
        .highlight { color: #facc15; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        .admin-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; }

        /* Pure Glassmorphism Structure Panel */
        .card-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .section-title { margin-bottom: 25px; color: #fff; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; color: var(--text-muted); font-size: 0.9rem; }

        input, select {
            width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border);
            border-radius: 10px; outline: none; font-size: 1rem; color: #fff; transition: 0.2s;
        }
        input:focus, select:focus { border-color: var(--primary); }

        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-success { background: var(--success); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); }
        .btn-success:hover { background: #059669; }

        .sem-block { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.02); }
        .sub-item-row { display: flex; justify-content: space-between; background: rgba(255,255,255,0.04); padding: 10px 14px; margin-bottom: 6px; border-radius: 8px; font-size: 0.95rem; }

        /* Student Live Tracker Feed Components */
        .logs-wrapper { max-height: 600px; overflow-y: auto; padding-right: 5px; }
        .log-box-card { border-left: 4px solid #10b981; background: rgba(255, 255, 255, 0.02); border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05); padding: 14px; margin-bottom: 12px; border-radius: 0 10px 10px 0; }
        .score-lbl-badge { color: #10b981; font-weight: 700; font-size: 1.1rem; text-shadow: 0 0 10px rgba(16,185,129,0.2); }

        @media(max-width: 850px) { .admin-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">⚙️ Central <span class="highlight">Admin Control</span></div>
        <a href="index.html" style="color: white; text-decoration: none; font-weight:600; background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 8px; font-size: 0.9rem;">← Main Website</a>
    </nav>

    <div class="container">
        <div class="admin-grid">
            
            <div class="card-panel">
                <h2 class="section-title">Manage Subjects</h2>
                <div class="form-group">
                    <label>Semester Name</label>
                    <input type="text" id="admin-sem" placeholder="e.g., Fall 2025">
                </div>
                <div class="form-group">
                    <label>Subject Name</label>
                    <input type="text" id="admin-sub-name" placeholder="e.g., Engineering Mechanics-I">
                </div>
                <div class="form-group">
                    <label>Credit Hours</label>
                    <input type="number" id="admin-sub-ch" min="1" max="5" placeholder="3">
                </div>
                <button class="btn btn-success" id="save-btn">Save Subject Structure</button>
                
                <h3 style="margin-top: 30px; margin-bottom:15px; color: var(--text-muted);">Active Configurations</h3>
                <div id="admin-list-container">Loading configurations...</div>
            </div>

            <div class="card-panel">
                <h2 class="section-title" style="color: #ef4444; text-shadow: 0 0 15px rgba(239, 68, 68, 0.15);">📊 Live User Calculations</h2>
                <div id="logs-container" class="logs-wrapper">
                    Loading live logs from students...
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRximbg48XT2HxpQoRdyp137soJwcEWqw",
            authDomain: "cpga-calculator-72d01.firebaseapp.com",
            databaseURL: "https://cpga-calculator-72d01-default-rtdb.firebaseio.com",
            projectId: "cpga-calculator-72d01",
            storageBucket: "cpga-calculator-72d01.firebasestorage.app",
            messagingSenderId: "1016677557350",
            appId: "1:1016677557350:web:3f388011c0d298825079a7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let academicData = {};

        async function loadInitialData() {
            const dbRef = ref(db);
            const snapshot = await get(child(dbRef, "uet_config/subjectsData"));
            if(snapshot.exists()) {
                academicData = snapshot.val();
            }
            renderAdminPanelList();
        }

        document.getElementById('save-btn').addEventListener('click', async () => {
            const sem = document.getElementById('admin-sem').value.trim();
            const name = document.getElementById('admin-sub-name').value.trim();
            const ch = parseInt(document.getElementById('admin-sub-ch').value);

            if(!sem || !name || !ch) return alert("Saari fields fill krna lazmi hain!");

            if(!academicData[sem]) academicData[sem] = [];
            academicData[sem].push({ id: Date.now(), name, ch });

            await set(ref(db, "uet_config/subjectsData"), academicData);
            document.getElementById('admin-sub-name').value = '';
            document.getElementById('admin-sub-ch').value = '';
            renderAdminPanelList();
        });

        window.deleteSubject = async function(sem, id) {
            academicData[sem] = academicData[sem].filter(sub => sub.id !== id);
            if(academicData[sem].length === 0) delete academicData[sem];
            await set(ref(db, "uet_config/subjectsData"), academicData);
            renderAdminPanelList();
        }

        function renderAdminPanelList() {
            const container = document.getElementById('admin-list-container');
            container.innerHTML = '';
            for(let sem in academicData) {
                let div = document.createElement('div');
                div.className = 'sem-block';
                div.innerHTML = `<h4 style="margin-bottom: 10px; color:#a78bfa;">${sem}</h4>`;
                academicData[sem].forEach(sub => {
                    div.innerHTML += `
                        <div class="sub-item-row">
                            <span>${sub.name} (${sub.ch} CH)</span>
                            <button onclick="deleteSubject('${sem}', ${sub.id})" style="color:#ef4444; border:none; background:none; cursor:pointer; font-weight:bold; font-size:1rem;">✕</button>
                        </div>`;
                });
                container.appendChild(div);
            }
        }

        const logsRef = ref(db, 'student_logs');
        onValue(logsRef, (snapshot) => {
            const container = document.getElementById('logs-container');
            container.innerHTML = '';
            if(!snapshot.exists()) {
                container.innerHTML = '<p style="color:#71717a;">No calculations made yet.</p>';
                return;
            }
            
            let logsArray = [];
            snapshot.forEach((childSnapshot) => {
                logsArray.push(childSnapshot.val());
            });
            
            logsArray.reverse().forEach((data) => {
                container.innerHTML += `
                    <div class="log-box-card">
                        <strong style="color:#fff; font-size:1.05rem;">${data.name}</strong> 
                        <span style="float:right; font-size:0.75rem; color:#71717a;">${data.timestamp}</span>
                        <p style="margin-top:5px; color:#d4d4d8; font-size:0.9rem;">Semester: <b style="color:#fbbf24;">${data.semester}</b> | Calculated CGPA: <span class="score-lbl-badge">${data.gpa}</span></p>
                    </div>`;
            });
        });

        loadInitialData();
    </script>
</body>
</html>
