<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Control Center</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg, #0f172a 0%, #020617 100%);">

    <nav class="navbar" style="background: rgba(0,0,0,0.4);">
        <div class="logo">⚙️ Central <span class="highlight">Admin Control</span></div>
        <a href="index.html" style="color: white; text-decoration: none; font-weight:600; font-size: 0.95rem; background: rgba(255,255,255,0.08); padding: 8px 16px; border-radius: 8px;">← Main Website</a>
    </nav>

    <div class="container" style="max-width: 1200px;">
        <div class="admin-grid">
            
            <div class="card-panel">
                <h2 class="section-title" style="color: #fff;">Manage Subjects</h2>
                <div class="form-group">
                    <label>Semester Name</label>
                    <input type="text" id="admin-sem" placeholder="e.g., Fall 2025">
                </div>
                <div class="form-group">
                    <label>Subject Name</label>
                    <input type="text" id="admin-sub-name" placeholder="e.g., Engineering Mechanics-I">
                </div>
                <div class="form-group">
                    <label>Credit Hours</label>
                    <input type="number" id="admin-sub-ch" min="1" max="5" placeholder="3">
                </div>
                <button class="btn btn-success" id="save-btn">Save Subject Structure</button>
                
                <h3 style="margin-top: 30px; margin-bottom:15px; color: #cbd5e1;">Active Configurations</h3>
                <div id="admin-list-container">Loading configurations...</div>
            </div>

            <div class="card-panel" style="background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255,255,255,0.1);">
                <h2 class="section-title" style="color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.2);">📊 Live User Calculations</h2>
                <div id="logs-container" style="max-height: 600px; overflow-y: auto; padding-right: 5px;">
                    Loading live logs from students...
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Config Auto-Injected
        const firebaseConfig = {
            apiKey: "AIzaSyCRximbg48XT2HxpQoRdyp137soJwcEWqw",
            authDomain: "cpga-calculator-72d01.firebaseapp.com",
            databaseURL: "https://cpga-calculator-72d01-default-rtdb.firebaseio.com",
            projectId: "cpga-calculator-72d01",
            storageBucket: "cpga-calculator-72d01.firebasestorage.app",
            messagingSenderId: "1016677557350",
            appId: "1:1016677557350:web:3f388011c0d298825079a7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let academicData = {};

        async function loadInitialData() {
            const dbRef = ref(db);
            const snapshot = await get(child(dbRef, "uet_config/subjectsData"));
            if(snapshot.exists()) {
                academicData = snapshot.val();
            }
            renderAdminPanelList();
        }

        document.getElementById('save-btn').addEventListener('click', async () => {
            const sem = document.getElementById('admin-sem').value.trim();
            const name = document.getElementById('admin-sub-name').value.trim();
            const ch = parseInt(document.getElementById('admin-sub-ch').value);

            if(!sem || !name || !ch) return alert("Saari fields fill krna lazmi hain!");

            if(!academicData[sem]) academicData[sem] = [];
            academicData[sem].push({ id: Date.now(), name, ch });

            await set(ref(db, "uet_config/subjectsData"), academicData);
            document.getElementById('admin-sub-name').value = '';
            document.getElementById('admin-sub-ch').value = '';
            renderAdminPanelList();
        });

        window.deleteSubject = async function(sem, id) {
            academicData[sem] = academicData[sem].filter(sub => sub.id !== id);
            if(academicData[sem].length === 0) delete academicData[sem];
            await set(ref(db, "uet_config/subjectsData"), academicData);
            renderAdminPanelList();
        }

        function renderAdminPanelList() {
            const container = document.getElementById('admin-list-container');
            container.innerHTML = '';
            for(let sem in academicData) {
                let div = document.createElement('div');
                div.innerHTML = `<h4 style="margin-top:15px; margin-bottom:8px; color:#818cf8;">${sem}</h4>`;
                academicData[sem].forEach(sub => {
                    div.innerHTML += `
                        <div style="display:flex; justify-content:space-between; background:rgba(255,255,255,0.05); padding:10px; margin-bottom:5px; border-radius:6px; border: 1px solid rgba(255,255,255,0.05); color:#e2e8f0;">
                            <span>${sub.name} (${sub.ch} CH)</span>
                            <button onclick="deleteSubject('${sem}', ${sub.id})" style="color:#ef4444; border:none; background:none; cursor:pointer; font-weight:bold; font-size:1rem;">✕</button>
                        </div>`;
                });
                container.appendChild(div);
            }
        }

        // Realtime logs data sync listener
        const logsRef = ref(db, 'student_logs');
        onValue(logsRef, (snapshot) => {
            const container = document.getElementById('logs-container');
            container.innerHTML = '';
            if(!snapshot.exists()) {
                container.innerHTML = '<p style="color:#94a3b8;">No calculations made yet.</p>';
                return;
            }
            
            let logsArray = [];
            snapshot.forEach((childSnapshot) => {
                logsArray.push(childSnapshot.val());
            });
            
            logsArray.reverse().forEach((data) => {
                container.innerHTML += `
                    <div style="border-left: 4px solid #10b981; background: rgba(255,255,255,0.03); border-top:1px solid rgba(255,255,255,0.05); border-bottom:1px solid rgba(255,255,255,0.05); border-right:1px solid rgba(255,255,255,0.05); padding: 12px; margin-bottom: 10px; border-radius:0 8px 8px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.15);">
                        <strong style="color:#fff; font-size:1.05rem;">${data.name}</strong> 
                        <span style="float:right; font-size:0.75rem; color:#64748b;">${data.timestamp}</span>
                        <p style="margin-top:5px; color:#cbd5e1; font-size:0.9rem;">Semester: <b>${data.semester}</b> | Calculated CGPA: <span style="color:#10b981; font-weight:700;">${data.gpa}</span></p>
                    </div>`;
            });
        });

        loadInitialData();
    </script>
</body>
</html>
