<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Management</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">⚙️ Admin <span class="highlight">Control Center</span></div>
        <a href="index.html" class="nav-back-btn">← Main Website</a>
    </nav>

    <div class="container" style="max-width: 1200px;">
        <div class="admin-grid-layout">
            
            <!-- Management Input Terminal -->
            <div class="glass-card">
                <h2 class="section-title text-left">Manage Subjects</h2>
                <div class="form-group">
                    <label>Semester Name</label>
                    <input type="text" id="admin-sem" placeholder="e.g., 1st semester">
                </div>
                <div class="form-group">
                    <label>Subject Name</label>
                    <input type="text" id="admin-sub-name" placeholder="e.g., Thermodynamics">
                </div>
                <div class="form-group">
                    <label>Credit Hours</label>
                    <input type="number" id="admin-sub-ch" min="1" max="6" placeholder="e.g., 3">
                </div>
                <button class="btn btn-primary" id="save-btn" style="width:100%;">Save Subject Structure</button>
                
                <h3 class="sub-heading-list">Active Configurations</h3>
                <div id="admin-list-container">Loading...</div>
            </div>

            <!-- Live Performance Feed -->
            <div class="glass-card live-feed-card">
                <h2 class="section-title text-left" style="color:#10b981;">📊 Live Calculations Log</h2>
                <div id="logs-container" class="logs-feed-box">Loading student tracking logs...</div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRximbg48XT2HxpQoRdyp137soJwcEWqw",
            authDomain: "cpga-calculator-72d01.firebaseapp.com",
            databaseURL: "https://cpga-calculator-72d01-default-rtdb.firebaseio.com",
            projectId: "cpga-calculator-72d01",
            storageBucket: "cpga-calculator-72d01.firebasestorage.app",
            messagingSenderId: "1016677557350",
            appId: "1:1016677557350:web:3f388011c0d298825079a7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let academicData = {};

        async function loadData() {
            const snapshot = await get(child(ref(db), "uet_config/subjectsData"));
            if(snapshot.exists()) academicData = snapshot.val();
            renderList();
        }

        document.getElementById('save-btn').addEventListener('click', async () => {
            const sem = document.getElementById('admin-sem').value.trim();
            const name = document.getElementById('admin-sub-name').value.trim();
            const ch = parseInt(document.getElementById('admin-sub-ch').value);

            if(!sem || !name || !ch) return alert("All fields are mandatory!");

            if(!academicData[sem]) academicData[sem] = [];
            academicData[sem].push({ id: Date.now(), name, ch });

            await set(ref(db, "uet_config/subjectsData"), academicData);
            document.getElementById('admin-sub-name').value = '';
            document.getElementById('admin-sub-ch').value = '';
            renderList();
        });

        window.deleteSubject = async function(sem, id) {
            academicData[sem] = academicData[sem].filter(s => s.id !== id);
            if(academicData[sem].length === 0) delete academicData[sem];
            await set(ref(db, "uet_config/subjectsData"), academicData);
            renderList();
        }

        function renderList() {
            const res = document.getElementById('admin-list-container');
            res.innerHTML = '';
            for(let sem in academicData) {
                let div = document.createElement('div');
                div.className = 'admin-block-item';
                div.innerHTML = `<div class='sem-badge-header'>${sem}</div>`;
                academicData[sem].forEach(s => {
                    div.innerHTML += `
                        <div class="admin-sub-row">
                            <span>${s.name} <small>(${s.ch} CH)</small></span>
                            <span class="del-icon" onclick="deleteSubject('${sem}', ${s.id})">✕</span>
                        </div>`;
                });
                res.appendChild(div);
            }
        }

        onValue(ref(db, 'student_logs'), (snapshot) => {
            const box = document.getElementById('logs-container');
            box.innerHTML = '';
            if(!snapshot.exists()) { box.innerHTML = '<p>No records generated yet.</p>'; return; }
            let arr = [];
            snapshot.forEach(c => { arr.push(c.val()); });
            arr.reverse().forEach(l => {
                box.innerHTML += `
                    <div class="log-card">
                        <div class="log-top"><strong>${l.name}</strong><small>${l.timestamp}</small></div>
                        <div class="log-body">Semester: <b>${l.semester}</b> | Score: <span class="score-lbl">${l.gpa}</span></div>
                    </div>`;
            });
        });

        loadData();
    </script>
</body>
</html>
