<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UET CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Confetti Library for Store Style Success -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">UET CGPA <span class="highlight">Calculator</span></div>
    </nav>

    <div class="container">
        <div class="glass-card animate-fade-in">
            <h2 class="section-title">Calculate Your GPA / CGPA</h2>
            
            <div class="form-group">
                <label for="student-name">Your Name</label>
                <input type="text" id="student-name" placeholder="Enter your name">
            </div>
            
            <div class="form-group">
                <label for="semester-select">Choose Semester</label>
                <select id="semester-select" onchange="loadSemesterSubjects()">
                    <option value="">-- Loading Semesters... --</option>
                </select>
            </div>

            <!-- Dynamic Table System -->
            <div id="calculator-table-wrapper" class="hidden">
                <!-- Perfect 3-Column Header Table Grid -->
                <div class="table-grid table-header">
                    <div class="col-subject">Subject Name</div>
                    <div class="col-points text-center">Grade Points</div>
                    <div class="col-grade text-right">Select Grade</div>
                </div>

                <!-- Live Container for Subjects Rows -->
                <div id="subjects-container"></div>
                
                <button id="calculate-btn" class="btn btn-primary main-calc-btn" onclick="calculateCGPA()">Calculate CGPA</button>
            </div>
        </div>
    </div>

    <!-- Store-Style Full-Screen Success Overlay -->
    <div id="success-overlay" class="overlay hidden">
        <div class="overlay-content">
            <div class="checkmark-circle">
                <div class="checkmark"></div>
            </div>
            <h1 class="overlay-title">CALCULATION COMPLETED</h1>
            <p id="result-message" class="overlay-msg"></p>
            <div class="final-score-box">
                YOUR CGPA IS: <span id="cgpa-score">0.00</span>
            </div>
            <button class="btn btn-close" onclick="closeOverlay()">Calculate Again</button>
        </div>
    </div>

    <!-- Firebase System Module Connection -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRximbg48XT2HxpQoRdyp137soJwcEWqw",
            authDomain: "cpga-calculator-72d01.firebaseapp.com",
            databaseURL: "https://cpga-calculator-72d01-default-rtdb.firebaseio.com",
            projectId: "cpga-calculator-72d01",
            storageBucket: "cpga-calculator-72d01.firebasestorage.app",
            messagingSenderId: "1016677557350",
            appId: "1:1016677557350:web:3f388011c0d298825079a7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const gradePoints = {
            'A': 4.00, 'A-': 3.70, 'B+': 3.30, 'B': 3.00, 'B-': 2.70,
            'C+': 2.30, 'C': 2.00, 'C-': 1.70, 'D+': 1.30, 'D': 1.00, 'F': 0.00
        };

        let academicData = {};

        async function fetchDatabase() {
            const dbRef = ref(db);
            try {
                const snapshot = await get(child(dbRef, "uet_config/subjectsData"));
                if (snapshot.exists()) {
                    academicData = snapshot.val();
                    populateSemesterDropdown();
                } else {
                    document.getElementById('semester-select').innerHTML = '<option value="">No configurations found</option>';
                }
            } catch (error) {
                console.error(error);
            }
        }

        function populateSemesterDropdown() {
            const select = document.getElementById('semester-select');
            select.innerHTML = '<option value="">-- Select Semester --</option>';
            for(let sem in academicData) {
                select.innerHTML += `<option value="${sem}">${sem}</option>`;
            }
        }

        window.loadSemesterSubjects = function() {
            const sem = document.getElementById('semester-select').value;
            const container = document.getElementById('subjects-container');
            const wrapper = document.getElementById('calculator-table-wrapper');
            container.innerHTML = '';

            if(!sem || !academicData[sem]) {
                wrapper.classList.add('hidden');
                return;
            }

            wrapper.classList.remove('hidden');

            academicData[sem].forEach((sub, index) => {
                let row = document.createElement('div');
                row.className = 'table-grid table-row';
                row.innerHTML = `
                    <div class="col-subject sub-meta">
                        <label class="checkbox-container">
                            <input type="checkbox" id="chk-${index}" checked data-ch="${sub.ch}">
                            <span class="checkmark-box"></span>
                        </label>
                        <div class="name-details">
                            <span class="sub-title">${sub.name}</span>
                            <span class="ch-counter">${sub.ch} CH</span>
                        </div>
                    </div>
                    <div class="col-points text-center dynamic-pts" id="pts-${index}">4.00</div>
                    <div class="col-grade text-right">
                        <select class="grade-selector" id="grade-${index}" onchange="updateLivePoints(${index})">
                            <option value="A">A</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B">B</option>
                            <option value="B-">B-</option>
                            <option value="C+">C+</option>
                            <option value="C">C</option>
                            <option value="C-">C-</option>
                            <option value="D+">D+</option>
                            <option value="D">D</option>
                            <option value="F">F</option>
                        </select>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        window.updateLivePoints = function(index) {
            const grade = document.getElementById(`grade-${index}`).value;
            const ptsDiv = document.getElementById(`pts-${index}`);
            if(gradePoints[grade] !== undefined) {
                ptsDiv.innerText = gradePoints[grade].toFixed(2);
            }
        }

        window.calculateCGPA = async function() {
            const sem = document.getElementById('semester-select').value;
            const studentName = document.getElementById('student-name').value.trim() || "Valued Student";
            let totalPoints = 0;
            let totalCreditHours = 0;

            academicData[sem].forEach((sub, index) => {
                const isChecked = document.getElementById(`chk-${index}`).checked;
                if(isChecked) {
                    const grade = document.getElementById(`grade-${index}`).value;
                    const points = gradePoints[grade];
                    totalPoints += (points * sub.ch);
                    totalCreditHours += sub.ch;
                }
            });

            if(totalCreditHours === 0) {
                alert("Please select at least one subject checkbox.");
                return;
            }

            const cgpa = (totalPoints / totalCreditHours).toFixed(2);
            
            try {
                await push(ref(db, 'student_logs'), {
                    name: studentName,
                    semester: sem,
                    gpa: cgpa,
                    timestamp: new Date().toLocaleString()
                });
            } catch (e) { console.error(e); }

            // Trigger Premium Store Fireworks Popup
            const overlay = document.getElementById('success-overlay');
            document.getElementById('cgpa-score').innerText = cgpa;
            document.getElementById('result-message').innerText = `Amazing effort, ${studentName}! Your performance data has been evaluated successfully.`;
            overlay.classList.remove('hidden');

            let duration = 4 * 1000;
            let end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 7, angle: 60, spread: 55, origin: { x: 0, y: 0.7 } });
                confetti({ particleCount: 7, angle: 120, spread: 55, origin: { x: 1, y: 0.7 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        window.closeOverlay = function() {
            document.getElementById('success-overlay').classList.add('hidden');
        }

        fetchDatabase();
    </script>
</body>
</html>
