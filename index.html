<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UET CGPA Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo">UET CGPA <span class="highlight">Calculator</span></div>
        </nav>

    <div class="container">
        <div class="card-panel">
            <h2 class="section-title">Calculate Your GPA / CGPA</h2>
            
            <div class="form-group">
                <label for="student-name">Your Name</label>
                <input type="text" id="student-name" placeholder="Enter your name">
            </div>
            
            <div class="form-group">
                <label for="semester-select">Choose Semester</label>
                <select id="semester-select" onchange="loadSemesterSubjects()">
                    <option value="">-- Loading Semesters... --</option>
                </select>
            </div>

            <div id="calculator-table-wrapper" class="hidden">
                <div class="table-columns-header">
                    <div class="header-col">Subject Name</div>
                    <div class="header-col text-center">Grade Points</div>
                    <div class="header-col text-right">Select Grade</div>
                </div>
                
                <div id="subjects-container" class="subjects-list"></div>
            </div>

            <button id="calculate-btn" class="btn btn-primary" onclick="calculateCGPA()" style="display: none;">Calculate CGPA</button>
        </div>
    </div>

    <div id="success-overlay" class="overlay hidden">
        <div class="overlay-content">
            <div class="checkmark-circle">
                <div class="checkmark"></div>
            </div>
            <h1 class="overlay-title">CALCULATION COMPLETED</h1>
            <p id="result-message" class="overlay-msg"></p>
            <div class="final-score-box">
                YOUR CGPA IS: <span id="cgpa-score">0.00</span>
            </div>
            <button class="btn-close" onclick="closeOverlay()">Calculate Again</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Config Auto-Injected
        const firebaseConfig = {
            apiKey: "AIzaSyCRximbg48XT2HxpQoRdyp137soJwcEWqw",
            authDomain: "cpga-calculator-72d01.firebaseapp.com",
            databaseURL: "https://cpga-calculator-72d01-default-rtdb.firebaseio.com",
            projectId: "cpga-calculator-72d01",
            storageBucket: "cpga-calculator-72d01.firebasestorage.app",
            messagingSenderId: "1016677557350",
            appId: "1:1016677557350:web:3f388011c0d298825079a7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const gradePoints = {
            'A': 4.00, 'A-': 3.70, 'B+': 3.30, 'B': 3.00, 'B-': 2.70,
            'C+': 2.30, 'C': 2.00, 'C-': 1.70, 'D+': 1.30, 'D': 1.00, 'F': 0.00
        };

        let academicData = {};

        async function fetchDatabase() {
            const dbRef = ref(db);
            try {
                const snapshot = await get(child(dbRef, "uet_config/subjectsData"));
                if (snapshot.exists()) {
                    academicData = snapshot.val();
                    populateSemesterDropdown();
                } else {
                    document.getElementById('semester-select').innerHTML = '<option value="">No data found in Admin Panel</option>';
                }
            } catch (error) {
                console.error(error);
            }
        }

        function populateSemesterDropdown() {
            const select = document.getElementById('semester-select');
            select.innerHTML = '<option value="">-- Select Semester --</option>';
            for(let sem in academicData) {
                select.innerHTML += `<option value="${sem}">${sem}</option>`;
            }
        }

        window.loadSemesterSubjects = function() {
            const sem = document.getElementById('semester-select').value;
            const container = document.getElementById('subjects-container');
            const calcBtn = document.getElementById('calculate-btn');
            const tableWrapper = document.getElementById('calculator-table-wrapper');
            container.innerHTML = '';

            if(!sem || !academicData[sem]) {
                calcBtn.style.display = 'none';
                tableWrapper.classList.add('hidden');
                return;
            }

            tableWrapper.classList.remove('hidden');

            academicData[sem].forEach((sub, index) => {
                let row = document.createElement('div');
                row.className = 'subject-row';
                row.innerHTML = `
                    <div class="col-subject-info">
                        <input type="checkbox" id="chk-${index}" checked data-ch="${sub.ch}">
                        <div class="sub-details">${sub.name} <span class="sub-ch">(${sub.ch} CH)</span></div>
                    </div>
                    <div class="col-points-live" id="pts-${index}">4.00</div>
                    <div class="col-grade-selector">
                        <select class="sub-grade" id="grade-${index}" onchange="updateLivePoints(${index})">
                            <option value="" disabled selected>Choose Grade</option>
                            ${Object.keys(gradePoints).map(g => `<option value="${g}">${g}</option>`).join('')}
                        </select>
                    </div>
                `;
                container.appendChild(row);
            });
            calcBtn.style.display = 'block';
        }

        window.updateLivePoints = function(index) {
            const grade = document.getElementById(`grade-${index}`).value;
            const ptsDiv = document.getElementById(`pts-${index}`);
            if(gradePoints[grade] !== undefined) {
                ptsDiv.innerText = gradePoints[grade].toFixed(2);
            }
        }

        window.calculateCGPA = async function() {
            const sem = document.getElementById('semester-select').value;
            const studentName = document.getElementById('student-name').value.trim() || "Anonymous Student";
            let totalPoints = 0;
            let totalCreditHours = 0;

            let missingGrade = false;

            academicData[sem].forEach((sub, index) => {
                const isChecked = document.getElementById(`chk-${index}`).checked;
                if(isChecked) {
                    const grade = document.getElementById(`grade-${index}`).value;
                    if(!grade) {
                        missingGrade = true;
                        return;
                    }
                    const points = gradePoints[grade];
                    totalPoints += (points * sub.ch);
                    totalCreditHours += sub.ch;
                }
            });

            if(missingGrade) return alert("Meharbani karke pehle sab subjects ke grades select karein!");
            if(totalCreditHours === 0) return alert("Kam az kam ek subject select karein!");

            const cgpa = (totalPoints / totalCreditHours).toFixed(2);
            
            try {
                const logsRef = ref(db, 'student_logs');
                await push(logsRef, {
                    name: studentName,
                    semester: sem,
                    gpa: cgpa,
                    timestamp: new Date().toLocaleString()
                });
            } catch (e) {
                console.error("Error saving log: ", e);
            }

            displayOverlayResult(cgpa, studentName);
        }

        function displayOverlayResult(cgpa, name) {
            const overlay = document.getElementById('success-overlay');
            const scoreSpan = document.getElementById('cgpa-score');
            const msgP = document.getElementById('result-message');

            scoreSpan.innerText = cgpa;
            
            if (cgpa >= 3.90) msgP.innerText = `👑 Outstanding, ${name}! You are at the absolute top tier of engineering!`;
            else if (cgpa >= 3.70) msgP.innerText = `🌟 Exceptional Work, ${name}! Brilliant performance!`;
            else if (cgpa >= 3.30) msgP.innerText = `✨ Brilliant, ${name}! Pushing boundaries successfully!`;
            else if (cgpa >= 3.00) msgP.innerText = `👍 Good Job, ${name}! Solid engineering performance!`;
            else msgP.innerText = `🎯 Growth Mindset, ${name}! Keep grinding, next semester will be massive!`;

            overlay.classList.remove('hidden');

            // Infinite Store Fireworks burst effect
            let duration = 4 * 1000;
            let end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 6, angle: 60, spread: 55, origin: { x: 0, y: 0.6 } });
                confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1, y: 0.6 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        window.closeOverlay = function() {
            document.getElementById('success-overlay').classList.add('hidden');
        }

        fetchDatabase();
    </script>
</body>
</html>
