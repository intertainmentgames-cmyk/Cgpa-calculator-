<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UET CGPA Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --primary-glow: conic-gradient(from 180deg at 50% 50%, #16a34a 0deg, #0284c7 120deg, #4f46e5 240deg, #16a34a 360deg);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --input-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-muted: #cbd5e1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        /* Liquid Dynamic Glass Theme Background */
        body {
            background-color: #0b0f19;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.3) 0px, transparent 50%),
                radial-gradient(at 50% 0%, rgba(79, 70, 229, 0.25) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(22, 163, 74, 0.2) 0px, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
            padding-bottom: 80px; /* Space for the footer */
            overflow-x: hidden;
        }

        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 22px 40px;
            background: rgba(11, 15, 25, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo { font-size: 1.5rem; font-weight: 700; color: white; letter-spacing: 0.5px; }
        .highlight { color: #34d399; text-shadow: 0 0 20px rgba(52, 211, 153, 0.4); }

        .container { max-width: 700px; margin: 40px auto; padding: 0 16px; }

        /* Liquid Glassmorphism Main Panel */
        .card-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 35px 30px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: fadeIn 0.5s ease-out;
        }

        .section-title { margin-bottom: 30px; color: var(--text-main); font-weight: 700; text-align: center; font-size: 1.6rem; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-muted); font-size: 0.9rem; }

        input, select {
            width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--glass-border);
            border-radius: 12px; outline: none; font-size: 1rem; color: #fff; transition: all 0.25s ease;
        }
        input:focus, select:focus { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.25); background: rgba(0,0,0,0.2); }
        select option { background: #0f1424; color: #fff; }

        /* Flawless 3-Column Lock Grid Architecture */
        .grid-layout {
            display: grid;
            grid-template-columns: 2.2fr 1fr 1.2fr;
            gap: 12px;
            align-items: center;
        }

        .table-heading {
            padding: 12px 10px;
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 30px;
            margin-bottom: 12px;
        }
        
        .table-heading .heading-item { display: block; }
        .table-heading .text-center { text-align: center; }
        .table-heading .text-right { text-align: right; padding-right: 10px; }

        .subject-row {
            background: rgba(255, 255, 255, 0.03);
            padding: 14px 12px;
            border-radius: 14px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        .subject-row:hover { background: rgba(255, 255, 255, 0.06); border-color: rgba(255, 255, 255, 0.15); }
        
        .sub-meta-container { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .subject-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: #38bdf8; cursor: pointer; flex-shrink: 0; }
        
        .subject-info-wrapper { min-width: 0; }
        .sub-details { font-weight: 600; color: #f8fafc; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .sub-ch { font-weight: 400; color: #38bdf8; font-size: 0.8rem; margin-top: 1px; }
        
        .live-points-col { text-align: center; font-weight: 700; color: #34d399; font-size: 1.05rem; }
        .sub-grade { width: 100%; padding: 8px 6px; font-size: 0.9rem; text-align: center; height: 38px; border-radius: 8px; }

        .btn {
            width: 100%; padding: 15px; border: none; border-radius: 14px;
            font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.25s ease;
        }
        .btn-primary { background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%); color: white; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.25); margin-top: 20px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(59, 130, 246, 0.4); }
        
        .btn-close { background: rgba(255, 255, 255, 0.08); border: 1px solid var(--glass-border); color: #fff; margin-top: 25px; font-size: 1rem; z-index: 10; position: relative; }
        .btn-close:hover { background: rgba(255, 255, 255, 0.15); }

        /* Store-Style Full Screen Confirmation Overlay Overlay System */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(7, 10, 19, 0.85); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 24px;
        }
        .overlay-content {
            position: relative; background: rgba(255, 255, 255, 0.04); border: 1px solid var(--glass-border);
            padding: 45px 35px; border-radius: 32px; text-align: center; max-width: 500px; width: 100%;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7); animation: scaleUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            overflow: hidden;
        }
        .overlay-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;
        }
        .overlay-inner-content {
            position: relative; z-index: 2; pointer-events: auto;
        }
        .checkmark-circle { width: 90px; height: 90px; border-radius: 50%; background: #10b981; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 0 40px rgba(16, 185, 129, 0.5); }
        .checkmark { width: 42px; height: 22px; border-left: 6px solid #fff; border-bottom: 6px solid #fff; transform: rotate(-45deg); margin-top: -8px; }
        
        .overlay-title { font-size: 1.6rem; font-weight: 800; color: #fff; margin-top: 25px; letter-spacing: 1.5px; }
        .overlay-msg { font-size: 1rem; color: #e2e8f0; margin: 16px 0 28px 0; line-height: 1.6; padding: 0 10px; }
        
        .final-score-box { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); padding: 20px; border-radius: 20px; font-weight: 500; color: var(--text-muted); font-size: 0.95rem; letter-spacing: 0.5px; }
        #cgpa-score { display: block; font-size: 3.2rem; font-weight: 700; color: #34d399; margin-top: 6px; text-shadow: 0 0 25px rgba(52, 211, 153, 0.4); }

        /* Shared Professional Footer Element Style */
        .footer {
            position: fixed; bottom: 0; left: 0; width: 100%; text-align: center;
            padding: 16px; background: rgba(11, 15, 25, 0.4); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); border-top: 1px solid var(--glass-border);
            font-size: 0.9rem; color: var(--text-muted); letter-spacing: 0.5px; z-index: 999;
        }

        .hidden { display: none !important; }

        /* Responsive Optimization to Lock Columns and Elements */
        @media(max-width: 600px) {
            .grid-layout { grid-template-columns: 1.8fr 0.9fr 1.3fr; gap: 8px; }
            .table-heading { font-size: 0.75rem; padding: 10px 4px; letter-spacing: 0.3px; }
            .subject-row { padding: 12px 6px; border-radius: 10px; }
            .sub-details { font-size: 0.85rem; }
            .live-points-col { font-size: 0.95rem; }
            .sub-grade { font-size: 0.8rem; padding: 4px; height: 34px; }
            .card-panel { padding: 25px 16px; }
            .overlay-content { padding: 35px 20px; }
            .overlay-title { font-size: 1.3rem; }
            #cgpa-score { font-size: 2.6rem; }
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">UET CGPA <span class="highlight">Calculator</span></div>
    </nav>

    <div class="container">
        <div class="card-panel">
            <h2 class="section-title">Calculate Your GPA / CGPA</h2>
            
            <div class="form-group">
                <label for="student-name">Your Name</label>
                <input type="text" id="student-name" placeholder="Enter your name">
            </div>
            
            <div class="form-group">
                <label for="semester-select">Choose Semester</label>
                <select id="semester-select" onchange="loadSemesterSubjects()">
                    <option value="">-- Loading Semesters... --</option>
                </select>
            </div>

            <div id="table-headings" class="grid-layout table-heading hidden">
                <div class="heading-item">Subject Name</div>
                <div class="heading-item text-center">Grade Point</div>
                <div class="heading-item text-right">Select Grade</div>
            </div>

            <div id="subjects-container" class="subjects-list"></div>

            <button id="calculate-btn" class="btn btn-primary" onclick="calculateCGPA()" style="display: none;">Calculate CGPA</button>
        </div>
    </div>

    <div id="success-overlay" class="overlay hidden">
        <div class="overlay-content">
            <canvas id="confetti-canvas" class="overlay-canvas"></canvas>
            <div class="overlay-inner-content">
                <div class="checkmark-circle">
                    <div class="checkmark"></div>
                </div>
                <h1 class="overlay-title">CALCULATION COMPLETED</h1>
                <p id="result-message" class="overlay-msg"></p>
                <div class="final-score-box">
                    YOUR CGPA IS <span id="cgpa-score">0.00</span>
                </div>
                <button class="btn btn-close" onclick="closeOverlay()">Calculate Again</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        Made with ❤️ for students
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, child, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRximbg48XT2HxpQoRdyp137soJwcEWqw",
            authDomain: "cpga-calculator-72d01.firebaseapp.com",
            databaseURL: "https://cpga-calculator-72d01-default-rtdb.firebaseio.com",
            projectId: "cpga-calculator-72d01",
            storageBucket: "cpga-calculator-72d01.firebasestorage.app",
            messagingSenderId: "1016677557350",
            appId: "1:1016677557350:web:3f388011c0d298825079a7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const gradePoints = {
            'A': 4.00, 'A-': 3.70, 'B+': 3.30, 'B': 3.00, 'B-': 2.70,
            'C+': 2.30, 'C': 2.00, 'C-': 1.70, 'D+': 1.30, 'D': 1.00, 'F': 0.00
        };

        let academicData = {};
        let animationFrameId = null;

        async function fetchDatabase() {
            const dbRef = ref(db);
            try {
                const snapshot = await get(child(dbRef, "uet_config/subjectsData"));
                if (snapshot.exists()) {
                    academicData = snapshot.val();
                    populateSemesterDropdown();
                } else {
                    document.getElementById('semester-select').innerHTML = '<option value="">No data found in Admin Panel</option>';
                }
            } catch (error) {
                console.error(error);
            }
        }

        function populateSemesterDropdown() {
            const select = document.getElementById('semester-select');
            select.innerHTML = '<option value="">-- Select Semester --</option>';
            for(let sem in academicData) {
                select.innerHTML += `<option value="${sem}">${sem}</option>`;
            }
        }

        window.loadSemesterSubjects = function() {
            const sem = document.getElementById('semester-select').value;
            const container = document.getElementById('subjects-container');
            const calcBtn = document.getElementById('calculate-btn');
            const headings = document.getElementById('table-headings');
            container.innerHTML = '';

            if(!sem || !academicData[sem]) {
                calcBtn.style.display = 'none';
                headings.classList.add('hidden');
                return;
            }

            headings.classList.remove('hidden');

            academicData[sem].forEach((sub, index) => {
                let row = document.createElement('div');
                row.className = 'grid-layout subject-row';
                row.innerHTML = `
                    <div class="sub-meta-container">
                        <input type="checkbox" id="chk-${index}" checked data-ch="${sub.ch}">
                        <div class="subject-info-wrapper">
                            <div class="sub-details" title="${sub.name}">${sub.name}</div>
                            <div class="sub-ch">${sub.ch} CH</div>
                        </div>
                    </div>
                    <div class="live-points-col" id="pts-${index}">4.00</div>
                    <div>
                        <select class="sub-grade" id="grade-${index}" onchange="updateLivePoints(${index})">
                            <option value="" disabled>Choose Grade</option>
                            ${Object.keys(gradePoints).map(g => `<option value="${g}">${g}</option>`).join('')}
                        </select>
                    </div>
                `;
                container.appendChild(row);
                document.getElementById(`grade-${index}`).value = "A";
            });
            calcBtn.style.display = 'block';
        }

        window.updateLivePoints = function(index) {
            const grade = document.getElementById(`grade-${index}`).value;
            const ptsDiv = document.getElementById(`pts-${index}`);
            if(gradePoints[grade] !== undefined) {
                ptsDiv.innerText = gradePoints[grade].toFixed(2);
            }
        }

        window.calculateCGPA = async function() {
            const sem = document.getElementById('semester-select').value;
            const studentName = document.getElementById('student-name').value.trim() || "Student";
            let totalPoints = 0;
            let totalCreditHours = 0;

            academicData[sem].forEach((sub, index) => {
                const isChecked = document.getElementById(`chk-${index}`).checked;
                if(isChecked) {
                    const grade = document.getElementById(`grade-${index}`).value;
                    const points = gradePoints[grade];
                    totalPoints += (points * sub.ch);
                    totalCreditHours += sub.ch;
                }
            });

            if(totalCreditHours === 0) return alert("Please select at least one subject!");

            const cgpa = (totalPoints / totalCreditHours).toFixed(2);
            
            try {
                const logsRef = ref(db, 'student_logs');
                await push(logsRef, {
                    name: studentName,
                    semester: sem,
                    gpa: cgpa,
                    timestamp: new Date().toLocaleString()
                });
            } catch (e) {
                console.error("Error saving log: ", e);
            }

            displayOverlayResult(cgpa, studentName);
        }

        function displayOverlayResult(cgpa, name) {
            const overlay = document.getElementById('success-overlay');
            const scoreSpan = document.getElementById('cgpa-score');
            const msgP = document.getElementById('result-message');
            const myCanvas = document.getElementById('confetti-canvas');

            scoreSpan.innerText = cgpa;
            overlay.classList.remove('hidden');

            if (cgpa >= 3.90) msgP.innerText = `👑 Excellent performance, ${name}! You are tracking at the absolute top tier!`;
            else if (cgpa >= 3.60) msgP.innerText = `🌟 Brilliant work, ${name}! Outstanding academic achievement!`;
            else if (cgpa >= 3.00) msgP.innerText = `👍 Good job, ${name}! Highly stable engineering performance!`;
            else if (cgpa >= 2.50) msgP.innerText = `✨ Fair work, ${name}! Steady performance, keep pushing higher!`;
            else msgP.innerText = `🎯 Continuous growth mindset, ${name}! Keep grinding, next term will be massive!`;

            // Custom instance binding to target overlay canvas element precisely
            const localConfetti = confetti.create(myCanvas, {
                resize: true,
                useWorker: true
            });

            let duration = 4 * 1000;
            let end = Date.now() + duration;

            function frame() {
                localConfetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0, y: 0.8 } });
                localConfetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1, y: 0.8 } });
                
                if (Date.now() < end) {
                    animationFrameId = requestAnimationFrame(frame);
                }
            }
            frame();
        }

        window.closeOverlay = function() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            const myCanvas = document.getElementById('confetti-canvas');
            const ctx = myCanvas.getContext('2d');
            ctx.clearRect(0, 0, myCanvas.width, myCanvas.height);
            
            document.getElementById('success-overlay').classList.add('hidden');
        }

        fetchDatabase();
    </script>
</body>
</html>
